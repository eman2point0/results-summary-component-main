<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Results summary component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      * {
        margin: 0px;
      }
      body {
        height: 100%;
      }
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }

      .container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px;
        border-radius: 1em;

        .container__left {
          display: flex;
          gap: 10%;
        }
      }
      html {
        font-size: 18px;
        --pale-blue-color: hsl(221, 100%, 96%);
      }
      .intro {
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100%;

        padding: 20px;

        background-image: linear-gradient(
          hsl(252, 100%, 67%),
          hsl(241, 81%, 54%)
        );
        border-bottom-right-radius: 10%;
        border-bottom-left-radius: 10%;
      }
      .light-lavendar {
        color: hsl(241, 100%, 89%);
      }
      .memory {
        background-color: hsla(39, 100%, 56%, 0.2);
        .category {
          color: hsl(39, 100%, 56%);
        }
      }
      .pale-blue {
        color: var(--pale-blue-color);
      }
      .reaction {
        background-color: hsla(0, 100%, 67%, 0.2);
        .category {
          color: hsl(0, 100%, 67%);
        }
      }
      .results {
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 20px;
      }
      .score-circle {
        border-radius: 50%;
        background-image: linear-gradient(
          hsla(256, 72%, 46%, 1),
          hsla(241, 72%, 46%, 0)
        );
        text-align: center;
        padding: 2em;
      }
      .verbal {
        background-color: hsla(166, 100%, 37%, 0.2);

        .category {
          color: hsl(166, 100%, 37%);
        }
      }
      .visual {
        background-color: hsla(234, 85%, 45%, 0.2);
        .category {
          color: hsl(234, 85%, 45%);
        }
      }
      .white {
        color: hsl(0, 0%, 100%);
      }
    </style>
  </head>
  <body>
    <section class="intro">
      <p class="pale-blue">Your Result</p>
      <div class="score-circle">
        <p class="white">76</p>
        <p class="light-lavendar">of 100</p>
      </div>
      <h1 class="white">Great</h1>
      <p class="light-lavendar">
        You scored higher than 65% of the people who have taken these tests.
      </p>
    </section>

    <section class="results">
      <h2 class="summary__title">Summary</h2>
      <div class="reaction container">
        <div class="container__left">
          <img
            src="./assets/images/icon-reaction.svg"
            alt="Lightning bolt icon"
          />
          <h3 class="category">Reaction</h3>
        </div>
        <div class="score">80 / 100</div>
      </div>
      <div class="memory container">
        <div class="container__left">
          <img src="./assets/images/icon-memory.svg" alt="Brain icon" />
          <h3 class="category">Memory</h3>
        </div>
        <div class="score">92 <span class="light-lavendar">/ 100</span></div>
      </div>
      <div class="verbal container">
        <div class="container__left">
          <img src="./assets/images/icon-verbal.svg" alt="Text bubble icon" />
          <h3 class="category">Verbal</h3>
        </div>
        <div class="score">61 / 100</div>
      </div>
      <div class="visual container">
        <div class="container__left">
          <img src="./assets/images/icon-visual.svg" alt="Eye icon" />
          <h3 class="category">Visual</h3>
        </div>
        <div class="score">72 / 100</div>
      </div>
      <button>Continue</button>
    </section>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Emanuel Barcenas</a>.
    </div>
  </body>
</html>
